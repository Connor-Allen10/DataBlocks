<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stored Items Table</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        Navigation:
        <a href="/home">Home</a>
        <a href="/players">Players</a>
        <a href="/worlds">Worlds</a>
        <a href="/advancements">Advancements</a>
        <a href="/stats">Statistics</a>
		<a href="/farms">Farms</a>
        <a href="/farmitems">Farm Items</a>
        <a href="/storageunits">Storage Units</a>
        <a href="/storeditems">Stored Items</a>
        <a class ="reset_button" href="/reset" id="reset-btn">RESET</a>
    </nav>

    <h1>Stored Items</h1>
    <div class="Description">
        <p>All items within Storage Units.</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>StoredItemID</th>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>StorageID</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody>
            <!-- rendered by JS -->
        </tbody>
    </table>

    <h2>Add a stored item</h2>
    <form id="add_stored_item_form" method="POST" action="/add-StoredItems">
        <label for="item_name_input">Item name:</label>
        <input type="text" name="item_name_input" id="item_name_input" required>
        <label for="quantity_input">Item Quantity:</label>
        <input type="number" name="quantity_input" id="quantity_input" required>

        <label for="unit_id_input">Storage Unit Id:</label>
        <select name="unit_id_input" id="unit_id_input" required>
            <option value="">Select a Storage Unit</option>
        </select>

        <input type="submit" value="Add stored item">
    </form>

    <h2>Edit Stored Item</h2>
    <form id="edit_stored_item_form" method="POST" action="/edit-StoredItems">
        <label for="stored_item_id_input">Stored Item ID:</label>
        <input type="number" name="stored_item_id" id="stored_item_id_input" required>

        <label for="item_name_input_edit">Item Name:</label>
        <input type="text" name="item_name_input" id="item_name_input_edit" required>

        <label for="quantity_input_edit">Item Quantity:</label>
        <input type="number" name="quantity_input" id="quantity_input_edit" required>

        <label for="unit_id_input_edit">Storage Unit ID:</label>
        <select name="unit_id_input" id="unit_id_input_edit" required>
            <option value="">Select a Storage Unit</option>
        </select>

        <input type="submit" value="Edit Stored Item">
    </form>

    <script>
    // Populate storage unit ID dropdowns
    function populateStorageUnitDropdowns() {
        fetch('/api/storageunits')
            .then(response => response.json())
            .then(storageunits => {
                const addSelect = document.getElementById('unit_id_input');
                const editSelect = document.getElementById('unit_id_input_edit');
                
                storageunits.forEach(unit => {
                    const option1 = document.createElement('option');
                    option1.value = unit.storage_id;
                    option1.textContent = `${unit.storage_id} - ${unit.storage_type} (World ${unit.world_id})`;
                    addSelect.appendChild(option1);
                    
                    const option2 = document.createElement('option');
                    option2.value = unit.storage_id;
                    option2.textContent = `${unit.storage_id} - ${unit.storage_type} (World ${unit.world_id})`;
                    editSelect.appendChild(option2);
                });
            });
    }

    // Fetch and render storage items table
    function renderStorageItemsTable() {
        fetch('/api/storeditems')
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(storeditems => {
                const tbody = document.querySelector('table tbody');
                tbody.innerHTML = '';
                storeditems.forEach(storeditem => {
                    const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${storeditem.stored_item_id}</td>
                            <td>${storeditem.item_name}</td>
                            <td>${storeditem.quantity}</td>
                            <td>${storeditem.storage_id}</td>
                            <td>
                                <form method="POST" action="/delete-StoredItems" style="display:inline;">
                                    <input type="hidden" name="stored_item_id" value="${storeditem.stored_item_id}">
                                    <button type="submit">Delete</button>
                                </form>
                            </td>
                        `;
                    tbody.appendChild(row);
                });
            })
            .catch(error => {
                const tbody = document.querySelector('table tbody');
                tbody.innerHTML = `<tr><td colspan=\"5\">Error loading stored items: ${error.message}</td></tr>`;
            });
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        populateStorageUnitDropdowns();
        renderStorageItemsTable();
    });
    </script>
</body>
</html>
